server:
  port: 9099

spring:
  config:
    import: optional:configserver:http://localhost:9097

  security:
    oauth2:
      resource-server:
        jwt:
          jwk-set-uri: http://localhost:8181/realms/fitness-app-realm/protocol/openid-connect/certs

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: lb://ACTIVITY-SERVICE
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: lb://AI-SERVICE
          predicates:
            - Path=/api/recommendation/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9098/eureka/